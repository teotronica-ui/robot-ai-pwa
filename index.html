<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Robot AI — Launcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a; --surface:#1e293b; --card:#263348;
      --accent:#10a37f; --accent2:#4f46e5; --text:#f1f5f9;
      --muted:#64748b; --radius:16px;
    }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100dvh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:30px 20px;
    }
    .logo { font-size:4rem; margin-bottom:8px; }
    h1 { font-size:1.5rem; font-weight:800; margin-bottom:6px; }
    .sub { font-size:.83rem; color:var(--muted); margin-bottom:40px; }

    .btn {
      display:flex; align-items:center; gap:18px;
      width:100%; max-width:380px; padding:26px 28px;
      border-radius:18px; border:none; color:#fff;
      font-size:1rem; font-weight:800; cursor:pointer;
      text-decoration:none; margin-bottom:18px;
      transition:transform .15s, box-shadow .15s;
    }
    .btn:active { transform:scale(.97); }
    .btn-openai {
      background:linear-gradient(135deg,#10a37f,#0d7f63);
      box-shadow:0 8px 30px rgba(16,163,127,.35);
    }
    .btn-openai:hover { box-shadow:0 12px 40px rgba(16,163,127,.55); transform:translateY(-2px); }
    .btn-gemini {
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      box-shadow:0 8px 30px rgba(79,70,229,.35);
    }
    .btn-gemini:hover { box-shadow:0 12px 40px rgba(79,70,229,.55); transform:translateY(-2px); }
    .btn-multi {
      background:linear-gradient(135deg,#f59e0b,#dc2626);
      box-shadow:0 8px 30px rgba(245,158,11,.35);
    }
    .btn-multi:hover { box-shadow:0 12px 40px rgba(245,158,11,.55); transform:translateY(-2px); }

    .btn .icon { font-size:2.2rem; }
    .btn .label { display:flex; flex-direction:column; align-items:flex-start; }
    .btn .name { font-size:1.4rem; font-weight:900; letter-spacing:2px; }
    .btn .desc { font-size:.72rem; font-weight:400; opacity:.85; margin-top:3px; }

    .footer { position:fixed; bottom:14px; font-size:.7rem; color:#334155; }
  </style>
</head>
<body>
  <div class="logo">🤖</div>
  <h1>Robot AI</h1>
  <p class="sub">Seleziona il modello da avviare</p>

  <a class="btn btn-openai" href="openai.html">
    <span class="icon">⚡</span>
    <div class="label">
      <span class="name">OPEN AI</span>
      <span class="desc">gpt-4o-realtime · gpt-4o-mini-realtime</span>
    </div>
  </a>

  <a class="btn btn-gemini" href="gemini.html">
    <span class="icon">✨</span>
    <div class="label">
      <span class="name">GEMINI</span>
      <span class="desc">Gemini 2.5 Flash Native Audio</span>
    </div>
  </a>

  <a class="btn btn-multi" href="pipeline.html">
    <span class="icon">🧩</span>
    <div class="label">
      <span class="name">MULTI TTS</span>
      <span class="desc">Pipeline modulare · STT → LLM → TTS</span>
    </div>
  </a>

  <div class="footer">Robot AI · GitHub Pages</div>
</body>
</html>
