<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Robot AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a; --surface:#1e293b; --card:#263348;
      --accent:#10a37f; --text:#f1f5f9; --muted:#64748b;
      --danger:#ef4444; --warn:#f59e0b; --radius:16px;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; }
    #screenInit { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 24px; gap:24px; }
    .logo-big { font-size:4rem; }
    h1 { font-size:1.6rem; font-weight:800; letter-spacing:1px; }
    .card { background:var(--surface); border-radius:var(--radius); padding:22px; width:100%; max-width:420px; }
    .card label { display:block; font-size:.75rem; color:var(--muted); margin-bottom:6px; letter-spacing:.5px; text-transform:uppercase; }
    .card input, .card select { width:100%; background:var(--card); border:1px solid #334155; border-radius:10px; color:var(--text); font-size:1rem; padding:12px 14px; outline:none; margin-bottom:16px; -webkit-appearance:none; }
    .card input:focus, .card select:focus { border-color:var(--accent); }
    .hint { font-size:.72rem; color:var(--muted); margin-top:-12px; margin-bottom:16px; }
    .btn-primary { width:100%; background:linear-gradient(135deg,var(--accent),#0d7f63); color:#fff; border:none; border-radius:14px; font-size:1.2rem; font-weight:800; padding:18px; cursor:pointer; letter-spacing:1px; transition:opacity .15s,transform .1s; }
    .btn-primary:active { opacity:.85; transform:scale(.98); }
    #screenMain { display:none; flex:1; flex-direction:column; }
    .topbar { background:var(--surface); padding:14px 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1e3a5f22; }
    .topbar .char-name { font-size:1rem; font-weight:700; }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); display:inline-block; margin-right:6px; transition:background .3s; }
    .status-dot.connected { background:var(--accent); box-shadow:0 0 6px var(--accent); }
    .status-dot.error { background:var(--danger); }
    .status-dot.talking { background:var(--warn); animation:pulse .6s ease infinite alternate; }
    @keyframes pulse { to { opacity:.4; } }
    .status-label { font-size:.78rem; color:var(--muted); }
    #vizCanvas { display:block; width:100%; height:70px; background:var(--bg); }
    #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; font-size:.88rem; }
    .msg { padding:10px 14px; border-radius:12px; max-width:88%; line-height:1.5; word-break:break-word; }
    .msg.robot { background:var(--surface); align-self:flex-start; border-bottom-left-radius:4px; }
    .msg.user { background:#163d2e; align-self:flex-end; border-bottom-right-radius:4px; color:#a7f3d0; }
    .msg.system { background:transparent; color:var(--muted); font-size:.75rem; align-self:center; font-style:italic; }
    .controls { background:var(--surface); border-top:1px solid #1e3a5f22; padding:14px 18px 24px; display:flex; flex-direction:column; gap:12px; }
    .controls-row { display:flex; gap:10px; align-items:center; }
    .btn-round { flex:1; height:60px; border-radius:14px; border:none; font-size:.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity .15s,transform .1s; letter-spacing:.5px; }
    .btn-round:active { opacity:.8; transform:scale(.97); }
    #btnConnect { background:linear-gradient(135deg,var(--accent),#0d7f63); color:#fff; }
    #btnConnect.active { background:linear-gradient(135deg,var(--danger),#b91c1c); }
    #btnMute { background:var(--card); color:var(--text); flex:0 0 60px; width:60px; }
    #btnMute.muted { background:#7f1d1d; color:#fca5a5; }
    .slider-row { display:flex; align-items:center; gap:10px; font-size:.78rem; color:var(--muted); }
    .slider-row input[type=range] { flex:1; accent-color:var(--accent); height:4px; }
    .slider-val { min-width:36px; text-align:right; font-variant-numeric:tabular-nums; }
    .info-bar { display:flex; justify-content:space-between; font-size:.72rem; color:var(--muted); padding:0 2px; }
    #settingsPanel { background:var(--card); border-radius:var(--radius); padding:16px; display:none; flex-direction:column; gap:10px; }
    #settingsPanel.open { display:flex; }
    #settingsPanel label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:2px; display:block; }
    #settingsPanel select, #settingsPanel input { width:100%; background:var(--surface); border:1px solid #334155; border-radius:8px; color:var(--text); font-size:.9rem; padding:8px 10px; -webkit-appearance:none; }
    #settingsPanel textarea { width:100%; background:var(--surface); border:1px solid #334155; border-radius:8px; color:var(--text); font-size:.85rem; padding:8px 10px; resize:vertical; outline:none; }
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-settings { background:transparent; border:1px solid #334155; border-radius:10px; color:var(--muted); font-size:.78rem; padding:8px 12px; cursor:pointer; display:flex; align-items:center; gap:6px; }
    #toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#1e293b; color:var(--text); border-radius:20px; padding:10px 20px; font-size:.82rem; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<div id="screenInit">
  <div class="logo-big">🤖</div>
  <h1>Robot AI</h1>
  <div class="card">
    <label>API Key OpenAI</label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" spellcheck="false">
    <div class="hint">🔒 Rimane solo in RAM — scompare alla chiusura</div>
    <label>Voce</label>
    <select id="initVoice">
      <option value="alloy">Alloy</option>
      <option value="echo">Echo</option>
      <option value="shimmer">Shimmer</option>
      <option value="verse">Verse</option>
      <option value="coral">Coral</option>
      <option value="ash">Ash</option>
    </select>
    <label>Modello</label>
    <select id="initModel">
      <option value="gpt-4o-realtime-preview">gpt-4o-realtime-preview</option>
      <option value="gpt-4o-mini-realtime-preview">gpt-4o-mini-realtime-preview</option>
    </select>
    <button class="btn-primary" onclick="goMain()">🚀 AVVIA</button>
  </div>
</div>

<div id="screenMain">
  <div class="topbar">
    <span class="char-name" id="charName">🤖 Robot AI</span>
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">Disconnesso</span>
    </div>
  </div>
  <canvas id="vizCanvas"></canvas>
  <div id="log"></div>
  <div class="controls">
    <div class="info-bar">
      <span id="timerLabel">⏱ --:--</span>
      <span id="tokenLabel">💰 -- tok</span>
      <span id="costLabel">$--.--</span>
    </div>
    <div id="settingsPanel">
      <div class="settings-grid">
        <div><label>VAD Threshold</label><input type="number" id="cfgVadThresh" value="0.5" step="0.05" min="0" max="1"></div>
        <div><label>Silenzio (ms)</label><input type="number" id="cfgSilenceMs" value="700" step="50"></div>
        <div><label>Temperatura</label><input type="number" id="cfgTemp" value="0.8" step="0.05" min="0" max="1.2"></div>
        <div><label>Eagerness</label>
          <select id="cfgEagerness">
            <option value="auto">Auto</option><option value="low">Low</option>
            <option value="medium">Medium</option><option value="high">High</option>
          </select>
        </div>
        <div><label>Voce</label>
          <select id="cfgVoice">
            <option value="alloy">Alloy</option><option value="echo">Echo</option>
            <option value="shimmer">Shimmer</option><option value="verse">Verse</option>
            <option value="coral">Coral</option><option value="ash">Ash</option>
          </select>
        </div>
        <div><label>Barge-in</label>
          <select id="cfgBargein">
            <option value="true">Attivo</option><option value="false">Disattivo</option>
          </select>
        </div>
      </div>
      <label>Istruzioni (system prompt)</label>
      <textarea id="cfgSystem" rows="4">Sei un assistente vocale simpatico e conciso. Rispondi sempre in italiano.</textarea>
    </div>
    <div class="controls-row">
      <button class="btn-round" id="btnConnect" onclick="toggleConnect()">
        <span id="btnConnectIcon">📡</span>
        <span id="btnConnectLabel">CONNETTI</span>
      </button>
      <button class="btn-round" id="btnMute" onclick="toggleMute()">🎙</button>
    </div>
    <div class="slider-row">
      <span>🎙 Gain</span>
      <input type="range" id="gainSlider" min="0.5" max="5" step="0.1" value="1" oninput="setGain(this.value)">
      <span class="slider-val" id="gainVal">1.0×</span>
    </div>
    <div class="controls-row" style="gap:8px">
      <button class="btn-settings" onclick="toggleSettings()">⚙️ Impostazioni</button>
      <button class="btn-settings" onclick="speedTest()">📶 Speed</button>
      <button class="btn-settings" id="btnRec" onclick="toggleRec()">⏺ REC</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let API_KEY='',ws=null,audioCtx=null,workletNode=null,micStream=null;
let muted=false,connected=false,settingsOpen=false;
let totalInputTok=0,totalOutputTok=0;
const PRICE_IN=5.00/1e6,PRICE_OUT=20.00/1e6;
let silenceStart=null,timerInterval=null;
let recChunks=[],isRecording=false;
const recSampleRate=24000;
const vizCanvas=document.getElementById('vizCanvas');
const vizCtx=vizCanvas.getContext('2d');
let analyser=null,vizFrame=null;
let currentRobotMsg=null,currentRobotText='';
let audioQueue=[],isPlaying=false;

function goMain(){
  API_KEY=document.getElementById('apiKey').value.trim();
  if(!API_KEY.startsWith('sk-')){toast('❌ Inserisci una API key valida (sk-...)');return;}
  document.getElementById('cfgVoice').value=document.getElementById('initVoice').value;
  document.getElementById('screenInit').style.display='none';
  document.getElementById('screenMain').style.display='flex';
  resizeViz();
  window.addEventListener('resize',resizeViz);
}

function resizeViz(){
  vizCanvas.width=vizCanvas.offsetWidth*devicePixelRatio;
  vizCanvas.height=vizCanvas.offsetHeight*devicePixelRatio;
  vizCtx.scale(devicePixelRatio,devicePixelRatio);
}

async function toggleConnect(){ if(connected){disconnect();}else{await connect();} }

async function connect(){
  setStatus('connecting');
  addLog('Connessione a OpenAI Realtime...','system');
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:24000}});
    audioCtx=new AudioContext({sampleRate:24000});
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    const src=audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    await audioCtx.audioWorklet.addModule('audio-processor.js');
    workletNode=new AudioWorkletNode(audioCtx,'pcm16-processor');
    workletNode.port.onmessage=onMicChunk;
    analyser.connect(workletNode);
    const model=document.getElementById('initModel').value;
    ws=new WebSocket(`wss://api.openai.com/v1/realtime?model=${model}`,
      ['realtime',`openai-insecure-api-key.${API_KEY}`,'openai-beta.realtime-v1']);
    ws.binaryType='arraybuffer';
    ws.onopen=()=>{
      sendSessionUpdate();
      setStatus('connected');connected=true;updateConnectBtn();
      addLog('✅ Connesso! Parla pure...','system');startViz();
    };
    ws.onmessage=onWsMessage;
    ws.onerror=()=>{toast('❌ Errore WebSocket');disconnect();};
    ws.onclose=()=>{if(connected){addLog('🔌 Connessione chiusa','system');disconnect();}};
  }catch(e){toast('❌ '+e.message);setStatus('error');disconnect();}
}

function disconnect(){
  connected=false;
  if(ws){try{ws.close();}catch(e){}ws=null;}
  if(workletNode){workletNode.port.postMessage({cmd:'stop'});workletNode=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  if(vizFrame){cancelAnimationFrame(vizFrame);vizFrame=null;}
  analyser=null;setStatus('disconnected');updateConnectBtn();
}

function sendSessionUpdate(){
  ws.send(JSON.stringify({type:'session.update',session:{
    modalities:['audio','text'],
    voice:document.getElementById('cfgVoice').value,
    instructions:document.getElementById('cfgSystem').value.trim(),
    temperature:parseFloat(document.getElementById('cfgTemp').value),
    turn_detection:{
      type:'server_vad',
      threshold:parseFloat(document.getElementById('cfgVadThresh').value),
      silence_duration_ms:parseInt(document.getElementById('cfgSilenceMs').value),
      prefix_padding_ms:300,create_response:true,
      interrupt_response:document.getElementById('cfgBargein').value==='true',
      eagerness:document.getElementById('cfgEagerness').value
    },
    input_audio_format:'pcm16',output_audio_format:'pcm16'
  }}));
}

function onMicChunk(e){
  if(!ws||ws.readyState!==WebSocket.OPEN||muted)return;
  const pcm=new Int16Array(e.data);
  const b64=btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
  ws.send(JSON.stringify({type:'input_audio_buffer.append',audio:b64}));
}

function onWsMessage(e){
  let msg;try{msg=JSON.parse(e.data);}catch{return;}
  switch(msg.type){
    case 'response.audio.delta':
      if(msg.delta){const bytes=Uint8Array.from(atob(msg.delta),c=>c.charCodeAt(0));
        audioQueue.push(new Int16Array(bytes.buffer));if(!isPlaying)drainAudio();}break;
    case 'response.audio_transcript.delta': if(msg.delta)appendRobotText(msg.delta);break;
    case 'response.audio_transcript.done': finalizeRobotText();break;
    case 'conversation.item.input_audio_transcription.completed':
      if(msg.transcript)addLog(msg.transcript,'user');break;
    case 'response.done': if(msg.response?.usage)updateTokens(msg.response.usage);break;
    case 'input_audio_buffer.speech_started': setStatus('listening');resetSilenceTimer();break;
    case 'input_audio_buffer.speech_stopped': setStatus('connected');startSilenceTimer();break;
    case 'response.audio.done': setStatus('connected');break;
    case 'error': toast('⚠️ '+(msg.error?.message||'Errore API'));break;
  }
}

async function drainAudio(){
  if(!audioCtx||audioQueue.length===0){isPlaying=false;return;}
  isPlaying=true;setStatus('talking');
  const pcm=audioQueue.shift();
  const float=new Float32Array(pcm.length);
  for(let i=0;i<pcm.length;i++)float[i]=pcm[i]/(pcm[i]<0?0x8000:0x7FFF);
  const buf=audioCtx.createBuffer(1,float.length,24000);
  buf.copyToChannel(float,0);
  if(isRecording)recChunks.push(pcm);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.connect(audioCtx.destination);
  src.onended=()=>drainAudio();src.start();
}

function appendRobotText(delta){
  currentRobotText+=delta;
  if(!currentRobotMsg){
    currentRobotMsg=document.createElement('div');
    currentRobotMsg.className='msg robot';
    document.getElementById('log').appendChild(currentRobotMsg);
  }
  currentRobotMsg.textContent=currentRobotText;scrollLog();
}

function finalizeRobotText(){currentRobotMsg=null;currentRobotText='';}

function addLog(text,type){
  const d=document.createElement('div');
  d.className='msg '+type;d.textContent=text;
  document.getElementById('log').appendChild(d);scrollLog();
}

function scrollLog(){const log=document.getElementById('log');log.scrollTop=log.scrollHeight;}

function updateTokens(usage){
  totalInputTok+=usage.input_tokens||0;totalOutputTok+=usage.output_tokens||0;
  const cost=totalInputTok*PRICE_IN+totalOutputTok*PRICE_OUT;
  document.getElementById('tokenLabel').textContent=`💰 ${totalInputTok+totalOutputTok} tok`;
  document.getElementById('costLabel').textContent=`$${cost.toFixed(4)}`;
}

function startSilenceTimer(){
  silenceStart=Date.now();clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-silenceStart)/1000);
    const m=Math.floor(s/60);
    document.getElementById('timerLabel').textContent=`⏱ ${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },500);
}

function resetSilenceTimer(){
  clearInterval(timerInterval);silenceStart=null;
  document.getElementById('timerLabel').textContent='⏱ --:--';
}

function setGain(v){
  document.getElementById('gainVal').textContent=parseFloat(v).toFixed(1)+'×';
  if(workletNode)workletNode.port.postMessage({cmd:'gain',value:parseFloat(v)});
}

function toggleMute(){
  muted=!muted;
  const btn=document.getElementById('btnMute');
  btn.textContent=muted?'🔇':'🎙';
  btn.classList.toggle('muted',muted);
  toast(muted?'🔇 Microfono silenziato':'🎙 Microfono attivo');
}

function startViz(){
  const W=()=>vizCanvas.offsetWidth,H=()=>vizCanvas.offsetHeight;
  function draw(){
    vizFrame=requestAnimationFrame(draw);if(!analyser)return;
    const data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    vizCtx.fillStyle='#0f172a';vizCtx.fillRect(0,0,W(),H());
    const barW=W()/data.length*2.5;let x=0;
    for(let i=0;i<data.length;i++){
      const h=(data[i]/255)*H();
      const g=vizCtx.createLinearGradient(0,H()-h,0,H());
      g.addColorStop(0,'#10a37f');g.addColorStop(1,'#0d7f6322');
      vizCtx.fillStyle=g;vizCtx.fillRect(x,H()-h,barW-1,h);x+=barW;
    }
  }
  draw();
}

function setStatus(s){
  const dot=document.getElementById('statusDot');
  const label=document.getElementById('statusLabel');
  dot.className='status-dot';
  switch(s){
    case 'connected': dot.classList.add('connected');label.textContent='Connesso';break;
    case 'connecting': label.textContent='Connessione...';break;
    case 'listening': dot.classList.add('talking');label.textContent='In ascolto...';break;
    case 'talking': dot.classList.add('talking');label.textContent='Risponde...';break;
    case 'error': dot.classList.add('error');label.textContent='Errore';break;
    default: label.textContent='Disconnesso';
  }
}

function updateConnectBtn(){
  const btn=document.getElementById('btnConnect');
  if(connected){
    btn.classList.add('active');
    document.getElementById('btnConnectIcon').textContent='🔴';
    document.getElementById('btnConnectLabel').textContent='DISCONNETTI';
  }else{
    btn.classList.remove('active');
    document.getElementById('btnConnectIcon').textContent='📡';
    document.getElementById('btnConnectLabel').textContent='CONNETTI';
  }
}

function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open',settingsOpen);
  if(connected&&!settingsOpen)sendSessionUpdate();
}

async function speedTest(){
  toast('📶 Speed test...');const t0=Date.now();
  try{
    await fetch('https://api.openai.com/v1/models',{headers:{Authorization:`Bearer ${API_KEY}`}});
    toast(`📶 Latenza: ${Date.now()-t0}ms`);
  }catch{toast('❌ Speed test fallito');}
}

function toggleRec(){
  isRecording=!isRecording;
  const btn=document.getElementById('btnRec');
  if(isRecording){
    recChunks=[];btn.textContent='⏹ STOP REC';btn.style.color='#ef4444';
    toast('⏺ Registrazione avviata');
  }else{
    btn.textContent='⏺ REC';btn.style.color='';
    if(recChunks.length>0)downloadWav();else toast('⚠️ Nessun audio registrato');
  }
}

function downloadWav(){
  const silence=new Int16Array(recSampleRate);
  const parts=[];
  recChunks.forEach((c,i)=>{parts.push(c);if(i<recChunks.length-1)parts.push(silence);});
  const total=parts.reduce((a,c)=>a+c.length,0);
  const pcm=new Int16Array(total);let off=0;
  parts.forEach(p=>{pcm.set(p,off);off+=p.length;});
  const wav=encodeWav(pcm,recSampleRate);
  const url=URL.createObjectURL(new Blob([wav],{type:'audio/wav'}));
  const a=document.createElement('a');
  a.href=url;a.download=`robot-rec-${Date.now()}.wav`;a.click();
  URL.revokeObjectURL(url);toast('💾 WAV salvato');
}

function encodeWav(pcm,sr){
  const buf=new ArrayBuffer(44+pcm.length*2);
  const v=new DataView(buf);
  const w=(off,str)=>[...str].forEach((c,i)=>v.setUint8(off+i,c.charCodeAt(0)));
  w(0,'RIFF');v.setUint32(4,36+pcm.length*2,true);
  w(8,'WAVE');w(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,1,true);v.setUint32(24,sr,true);
  v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);w(36,'data');
  v.setUint32(40,pcm.length*2,true);
  for(let i=0;i<pcm.length;i++)v.setInt16(44+i*2,pcm[i],true);
  return buf;
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
</body>
</html>
