<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Live — Test Connessione</title>
<style>
  body{font-family:monospace;background:#070d18;color:#dff0ff;padding:20px;max-width:500px;margin:0 auto}
  h2{color:#4f8aff;margin-bottom:20px}
  button{width:100%;padding:16px;font-size:1.1rem;font-weight:bold;border:none;border-radius:10px;cursor:pointer;margin-bottom:10px}
  #btnConn{background:#4f8aff;color:#fff}
  #btnConn.disc{background:#ff3d3d}
  #log{background:#040c15;border:1px solid #162538;border-radius:8px;padding:12px;height:350px;overflow-y:auto;font-size:.75rem;line-height:1.8}
  .ok{color:#00e5a0}.er{color:#ff3d3d}.inf{color:#ffb800}.dim{color:#3d6080}
  input{width:100%;padding:10px;background:#0c1525;border:1px solid #162538;border-radius:8px;color:#dff0ff;font-family:monospace;margin-bottom:10px;box-sizing:border-box}
  select{width:100%;padding:10px;background:#0c1525;border:1px solid #162538;border-radius:8px;color:#dff0ff;font-family:monospace;margin-bottom:10px}
  label{font-size:.7rem;color:#3d6080;display:block;margin-bottom:4px}
</style>
</head>
<body>
<h2>🧪 Gemini Live — Test</h2>

<label>API Key Google (AIza...)</label>
<input type="password" id="keyIn" placeholder="AIza..." autocomplete="off">

<label>Modello</label>
<select id="selModel">
  <option value="gemini-2.0-flash-live-001">gemini-2.0-flash-live-001  (v1alpha)</option>
  <option value="gemini-live-2.5-flash-preview">gemini-live-2.5-flash-preview  (v1alpha)</option>
  <option value="gemini-2.5-flash-native-audio-preview-09-2025">gemini-2.5-flash-native-audio-preview-09-2025  (v1beta)</option>
</select>

<button id="btnConn" onclick="toggle()">🔌 CONNETTI</button>

<div id="log"></div>

<script>
const LS_KEY = 'robot_key_gemini';

// Carica chiave salvata
window.onload = () => {
  const k = localStorage.getItem(LS_KEY);
  if(k) document.getElementById('keyIn').value = k;
};

// Salva chiave quando inserita
document.getElementById('keyIn').addEventListener('input', () => {
  const k = document.getElementById('keyIn').value.trim();
  if(k.length > 10) localStorage.setItem(LS_KEY, k);
});

let ws = null;

function log(msg, cls='inf'){
  const d = document.getElementById('log');
  const t = new Date().toLocaleTimeString('it');
  d.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}

function toggle(){
  if(ws){ disconnect(); return; }
  connect();
}

function connect(){
  const key = document.getElementById('keyIn').value.trim();
  if(key.length < 10){ log('❌ Chiave mancante', 'er'); return; }

  const model = document.getElementById('selModel').value;

  // URL: 2.0 e live-preview → v1alpha, 2.5 native-audio → v1beta
  const apiVer = (model.startsWith('gemini-2.0') || model.includes('live-2.5') || model.includes('live-preview'))
    ? 'v1alpha' : 'v1beta';

  const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.${apiVer}.GenerativeService.BidiGenerateContent?key=${key}`;

  log(`🔌 Tentativo connessione...`);
  log(`📡 Modello: <b>${model}</b>`);
  log(`🔗 URL: ...${apiVer}.GenerativeService...`, 'dim');

  ws = new WebSocket(url);

  ws.onopen = () => {
    log('✅ WebSocket APERTO — invio setup...', 'ok');

    // Setup minimalissimo — solo model e responseModalities
    const setup = {
      model: 'models/' + model,
      generationConfig: {
        responseModalities: ['AUDIO'],
        speechConfig: {
          voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Aoede' } }
        }
      }
    };

    const msg = JSON.stringify({ setup });
    log('📤 Setup: ' + msg.slice(0, 120) + '...', 'dim');
    ws.send(msg);

    document.getElementById('btnConn').textContent = '🔴 DISCONNETTI';
    document.getElementById('btnConn').classList.add('disc');
  };

  ws.onmessage = (e) => {
    let raw = typeof e.data === 'string' ? e.data
            : e.data instanceof ArrayBuffer ? new TextDecoder().decode(e.data)
            : null;
    if(!raw){ log('⚠️ Messaggio tipo: ' + typeof e.data, 'er'); return; }

    let m;
    try { m = JSON.parse(raw); } catch(ex) {
      log('❌ JSON parse error: ' + ex.message + ' | ' + raw.slice(0,60), 'er');
      return;
    }

    const s = JSON.stringify(m);
    if('setupComplete' in m){
      log('🎉 setupComplete ricevuto — CONNESSO!', 'ok');
    } else if(s.includes('"data"')){
      log('🔊 Chunk audio ricevuto (' + Math.round(s.length*0.75) + ' bytes)', 'ok');
    } else {
      log('📨 Messaggio: ' + s.slice(0, 150), s.includes('error') ? 'er' : 'inf');
    }
  };

  ws.onerror = (e) => {
    log('❌ WS errore', 'er');
    console.error(e);
  };

  ws.onclose = (e) => {
    log(`🔌 WS chiuso: ${e.code} — ${e.reason || '(nessun motivo)'}`, e.code === 1000 ? 'dim' : 'er');
    ws = null;
    document.getElementById('btnConn').textContent = '🔌 CONNETTI';
    document.getElementById('btnConn').classList.remove('disc');
  };
}

function disconnect(){
  if(ws){ ws.close(); ws = null; }
}
</script>
</body>
</html>
