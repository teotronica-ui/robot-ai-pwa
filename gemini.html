<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Live — Test Audio</title>
<style>
  body{font-family:monospace;background:#070d18;color:#dff0ff;padding:20px;max-width:500px;margin:0 auto}
  h2{color:#4f8aff;margin-bottom:20px}
  button{width:100%;padding:16px;font-size:1.1rem;font-weight:bold;border:none;border-radius:10px;cursor:pointer;margin-bottom:10px}
  #btnConn{background:#4f8aff;color:#fff}
  #btnConn.disc{background:#ff3d3d}
  #log{background:#040c15;border:1px solid #162538;border-radius:8px;padding:12px;height:400px;overflow-y:auto;font-size:.75rem;line-height:1.8}
  .ok{color:#00e5a0}.er{color:#ff3d3d}.inf{color:#ffb800}.dim{color:#3d6080}
  input{width:100%;padding:10px;background:#0c1525;border:1px solid #162538;border-radius:8px;color:#dff0ff;font-family:monospace;margin-bottom:10px;box-sizing:border-box}
  select{width:100%;padding:10px;background:#0c1525;border:1px solid #162538;border-radius:8px;color:#dff0ff;font-family:monospace;margin-bottom:10px}
  label{font-size:.7rem;color:#3d6080;display:block;margin-bottom:4px}
  #vuBar{height:14px;background:#040c15;border:1px solid #162538;border-radius:6px;overflow:hidden;margin-bottom:10px}
  #vuFill{height:100%;width:0%;background:#4f8aff;transition:width .05s}
</style>
</head>
<body>
<h2>🧪 Gemini Live — Test Audio</h2>

<label>API Key Google (AIza...)</label>
<input type="password" id="keyIn" placeholder="AIza..." autocomplete="off">

<label>Modello</label>
<select id="selModel">
  <option value="gemini-2.5-flash-native-audio-preview-09-2025" selected>gemini-2.5-flash-native-audio-preview-09-2025 ✅</option>
  <option value="gemini-2.5-flash-native-audio-preview-12-2025">gemini-2.5-flash-native-audio-preview-12-2025</option>
  <option value="gemini-2.0-flash-live-001">gemini-2.0-flash-live-001</option>
</select>

<button id="btnConn" onclick="toggle()">🔌 CONNETTI</button>

<div id="vuBar"><div id="vuFill"></div></div>
<div id="log"></div>

<script>
const LS_KEY = 'robot_key_gemini';
const OUTPUT_SR = 24000;

window.onload = () => {
  const k = localStorage.getItem(LS_KEY);
  if(k) document.getElementById('keyIn').value = k;
};
document.getElementById('keyIn').addEventListener('input', () => {
  const k = document.getElementById('keyIn').value.trim();
  if(k.length > 10) localStorage.setItem(LS_KEY, k);
});

let ws = null, audioCtx = null, workletNode = null, micStream = null;
let nextPlayTime = 0, setupReady = false;

function log(msg, cls='inf'){
  const d = document.getElementById('log');
  const t = new Date().toLocaleTimeString('it');
  d.innerHTML += '<div class="'+cls+'">['+t+'] '+msg+'</div>';
  d.scrollTop = d.scrollHeight;
}

function toggle(){ ws ? disconnect() : connect(); }

async function connect(){
  const key = document.getElementById('keyIn').value.trim();
  if(key.length < 10){ log('❌ Chiave mancante', 'er'); return; }

  const model = document.getElementById('selModel').value;
  const apiVer = model.startsWith('gemini-live-') ? 'v1alpha' : 'v1beta';
  const url = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.'+apiVer+'.GenerativeService.BidiGenerateContent?key='+key;

  log('🔌 Connessione → '+model);
  setupReady = false;

  // AudioContext per playback a 24kHz
  audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:OUTPUT_SR});
  if(audioCtx.state==='suspended') await audioCtx.resume();

  // Microfono
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    log('🎤 Microfono OK — SR AudioContext: '+audioCtx.sampleRate+'Hz', 'ok');
    await audioCtx.audioWorklet.addModule('audio-processor.js');
    workletNode = new AudioWorkletNode(audioCtx,'pcm16-processor');
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(workletNode);
    workletNode.port.onmessage = onChunk;
  } catch(e) {
    log('❌ Microfono: '+e.message, 'er');
    return;
  }

  ws = new WebSocket(url);

  ws.onopen = () => {
    log('✅ WS aperto — invio setup...', 'ok');
    const setup = {
      model: 'models/'+model,
      generationConfig: {
        responseModalities: ['AUDIO'],
        speechConfig: {voiceConfig:{prebuiltVoiceConfig:{voiceName:'Aoede'}}}
      }
    };
    ws.send(JSON.stringify({setup}));
    document.getElementById('btnConn').textContent = '🔴 DISCONNETTI';
    document.getElementById('btnConn').classList.add('disc');
  };

  ws.onmessage = async (e) => {
    let raw;
    if(typeof e.data==='string') raw=e.data;
    else if(e.data instanceof ArrayBuffer) raw=new TextDecoder().decode(e.data);
    else if(e.data instanceof Blob) raw=await e.data.text();
    else { log('⚠️ tipo: '+e.data?.constructor?.name,'er'); return; }

    let m;
    try { m=JSON.parse(raw); }
    catch(ex){ log('❌ JSON: '+ex.message+' | '+raw.slice(0,60),'er'); return; }

    if('setupComplete' in m){
      setupReady=true; nextPlayTime=0;
      log('🎉 setupComplete — CONNESSO! Parla ora...','ok');
      return;
    }
    if(m.serverContent?.modelTurn?.parts){
      for(const part of m.serverContent.modelTurn.parts){
        if(part.inlineData?.mimeType?.startsWith('audio/pcm')){
          const bytes=Uint8Array.from(atob(part.inlineData.data),c=>c.charCodeAt(0));
          playPCM(new Int16Array(bytes.buffer));
          log('🔊 Audio: '+bytes.length+' bytes','ok');
        }
      }
    }
    if(m.serverContent?.turnComplete) log('✅ Fine risposta','ok');
    if(m.serverContent?.interrupted)  log('🛑 Interrotto','inf');
    if(m.error) log('❌ Errore API: '+JSON.stringify(m.error),'er');
  };

  ws.onerror = () => log('❌ WS errore','er');
  ws.onclose = (e) => {
    log('🔌 WS chiuso: '+e.code+' — '+(e.reason||'(nessun motivo)'), e.code===1000?'dim':'er');
    cleanup();
  };
}

function onChunk(e){
  if(!setupReady||!ws||ws.readyState!==WebSocket.OPEN) return;
  const pcm=new Int16Array(e.data);
  // VU meter
  let sum=0; for(let i=0;i<pcm.length;i++) sum+=pcm[i]*pcm[i];
  const rms=Math.sqrt(sum/pcm.length);
  document.getElementById('vuFill').style.width=Math.min(100,rms/320)+'%';
  // Encode e invia
  const bytes=new Uint8Array(pcm.buffer);
  let bin=''; const cs=8192;
  for(let i=0;i<bytes.length;i+=cs) bin+=String.fromCharCode(...bytes.subarray(i,i+cs));
  const actualSR=audioCtx?audioCtx.sampleRate:48000;
  ws.send(JSON.stringify({realtimeInput:{mediaChunks:[{data:btoa(bin),mimeType:'audio/pcm;rate='+actualSR}]}}));
}

function playPCM(pcm){
  if(!audioCtx) return;
  const f=new Float32Array(pcm.length);
  for(let i=0;i<pcm.length;i++) f[i]=pcm[i]/(pcm[i]<0?0x8000:0x7FFF);
  const buf=audioCtx.createBuffer(1,f.length,OUTPUT_SR);
  buf.copyToChannel(f,0);
  const src=audioCtx.createBufferSource();
  src.buffer=buf; src.connect(audioCtx.destination);
  const startAt=Math.max(audioCtx.currentTime+0.01,nextPlayTime);
  src.start(startAt);
  nextPlayTime=startAt+buf.duration;
}

function disconnect(){ if(ws) ws.close(); cleanup(); }

function cleanup(){
  setupReady=false; ws=null;
  if(workletNode){try{workletNode.disconnect();}catch(e){} workletNode=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop()); micStream=null;}
  if(audioCtx){try{audioCtx.close();}catch(e){} audioCtx=null;}
  document.getElementById('btnConn').textContent='🔌 CONNETTI';
  document.getElementById('btnConn').classList.remove('disc');
  document.getElementById('vuFill').style.width='0%';
}
</script>
</body>
</html>
